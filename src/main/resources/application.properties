# ============================================================
# DATASOURCE
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fintrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sa123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# APP
# ============================================================
server.port=8080
spring.application.name=fintrack

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:fintrack-super-secret-key-change-this-in-production-min-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}